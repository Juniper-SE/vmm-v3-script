---
- name: Updating system
  hosts:
    - all
  become: yes
  become_method: sudo
  tasks:
  - name: apt -y update
    apt:
      update_cache: true
      cache_valid_time: 3600
      force_apt_get: true
  - name: apt -y upgrade
    apt:
      update_cache: true
      upgrade: dist
      cache_valid_time: 3600
      force_apt_get: true
      state: latest
  - name: install ntp server
    apt:
      name: ntp
      state: present
  - name: edit /etc/ntp.conf
    ansible.builtin.blockinfile:
      path: /etc/ntp.conf
      block: |
        server anyntp.juniper.net prefer iburst
  - name: edit ntp server
    ansible.builtin.lineinfile:
      path: /etc/ntp.conf
      regexp: '^pool'
      state: absent
  - name: restart ntp
    ansible.builtin.service:
      name: ntp
      state: restarted
      enabled: true
- name: prepare kubernetes node
  hosts:
    - node1
    - node2
    - node3
  become: yes
  become_method: sudo
  tasks:
  - name: add into limits.conf
    ansible.builtin.blockinfile:
      path: /etc/security/limits.conf
      block: |
        *         hard    nofile      1048576
        *         soft    nofile      1048576
        root      hard    nofile      1048576
        root      soft    nofile      1048576
        influxdb  hard    nofile      1048576
        influxdb  soft    nofile      1048576
  - name: add into /etc/hosts
    ansible.builtin.blockinfile:
      path: /etc/hosts
      block: |
        172.16.11.101 node1
        172.16.11.102 node2
        172.16.11.103 node3
        172.16.12.11 control
        172.16.11.95 registry
  - name: add into sysctl.conf
    ansible.builtin.blockinfile:
      path: /etc/sysctl.conf
      block: |
        fs.file-max = 2097152
        vm.max_map_count=262144
        fs.inotify.max_user_watches=524288
        fs.inotify.max_user_instances=512
  # - name: add into sshd_config
  #   ansible.builtin.blockinfile:
  #     path: /etc/ssh/sshd_config
  #     block: |
  #       AllowTcpForwarding yes
  - name: edit sshd_config
    ansible.builtin.lineinfile:
      path: /etc/ssh/sshd_config
      regexp: '#AllowTcpForwarding yes'
      line: AllowTcpForwarding yes
  - name: restart sshd
    ansible.builtin.service:
      name: sshd
      state: restarted
      enabled: true
  - name: create file 
    copy:
      dest: /tmp/create_part.sh
      content: |
        #!/bin/bash
        #sudo fdisk -l /dev/sda
        echo "n
        2


        w
        q
        " | sudo fdisk /dev/sda
        # sudo fdisk -l /dev/sda
  - name: Change mode /tmp/create_part.sh
    ansible.builtin.file:
      path: /tmp/create_part.sh
      mode: '0700'
  - name: run script /tmp/create_part.sh
    shell: | 
      /tmp/create_part.sh
      rm /tmp/create_part.sh
- name: rebooting host
  hosts:
  - all
  become: yes
  become_method: sudo
  tasks:
  - name: reboot node
    ansible.builtin.reboot:
