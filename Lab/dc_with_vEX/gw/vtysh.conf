!
router bgp 4200009000
 no bgp ebgp-requires-policy
 neighbor 172.16.16.1 remote-as 4200009001
 neighbor fc00:dead:beef:ff16::1 remote-as 4200009001
 !
 address-family ipv4 unicast
  network 0.0.0.0/0
